<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Reflex Challenge - Prize Focused</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+KR:wght@300;700&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #020617; color: white; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; touch-action: none; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(30px); border: 1px solid rgba(56, 189, 248, 0.3); box-shadow: 0 0 60px rgba(0,0,0,0.8); }
        .btn-tap:active { transform: scale(0.95); opacity: 0.9; }
        .hidden { display: none !important; }
        
        input { 
            font-size: 1.1rem !important;
            outline: none; 
            transition: all 0.2s ease; 
            background: rgba(30, 41, 59, 0.6) !important; 
            border: 1.5px solid #334155; 
            color: white; 
            width: 100%; 
            padding: 1rem 1.25rem !important;
            border-radius: 1rem; 
            font-weight: 600;
        }
        input:focus { 
            border-color: #38bdf8; 
            background: rgba(30, 41, 59, 0.9) !important;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); 
        }
        
        /* 안내 문구 강조 애니메이션 */
        @keyframes pulse-border {
            0% { border-color: rgba(56, 189, 248, 0.3); transform: scale(1); }
            50% { border-color: rgba(56, 189, 248, 0.8); transform: scale(1.02); }
            100% { border-color: rgba(56, 189, 248, 0.3); transform: scale(1); }
        }
        .prize-notice {
            animation: pulse-border 2s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <div id="canvas-wrapper" class="relative w-full h-full flex items-center justify-center">
        <canvas id="gameCanvas" class="block w-full h-full z-0"></canvas>
        
        <div id="ui-layer" class="absolute inset-0 z-10 flex items-center justify-center pointer-events-none p-6">
            
            <!-- HUD -->
            <div id="hud" class="hidden absolute top-10 left-6 right-6 flex justify-between pointer-events-none">
                <div class="glass-panel px-5 py-2 rounded-xl border-l-4 border-sky-500">
                    <p class="text-[9px] text-sky-400 font-bold uppercase font-orbitron">Score</p>
                    <p id="score-display" class="text-xl font-black font-orbitron">0000</p>
                </div>
                <div class="glass-panel px-5 py-2 rounded-xl text-right border-r-4 border-rose-500">
                    <p class="text-[9px] text-rose-400 font-bold uppercase font-orbitron">Level</p>
                    <p id="level-display" class="text-xl font-black font-orbitron">LV.01</p>
                </div>
            </div>

            <!-- Start Screen -->
            <div id="screen-start" class="pointer-events-auto w-full max-w-sm">
                <div class="glass-panel p-10 rounded-[3rem] text-center">
                    <h1 class="text-4xl font-black text-sky-400 mb-2 italic uppercase font-orbitron">Reflex AI</h1>
                    <p id="status-text" class="text-slate-500 text-[9px] mb-10 tracking-[0.3em] font-orbitron">WAITING AUTH...</p>
                    <button id="btn-start" onclick="window.game.start()" disabled class="btn-tap w-full bg-slate-800 py-5 rounded-2xl font-black text-lg uppercase font-orbitron text-white opacity-40 transition-all">Connect</button>
                    <button onclick="window.ui.showAdmin()" class="w-full mt-8 text-slate-700 text-[10px] font-bold uppercase font-orbitron hover:text-sky-500 transition-colors">Admin Dashboard</button>
                </div>
            </div>

            <!-- Save Screen (안내 문구 크기 및 강조 강화) -->
            <div id="screen-save" class="hidden pointer-events-auto w-full max-w-sm">
                <div class="glass-panel p-8 rounded-[2.5rem]">
                    <h2 class="text-2xl font-black text-rose-500 mb-4 text-center uppercase font-orbitron italic">Game Over</h2>
                    
                    <!-- 강조된 안내 문구 -->
                    <div class="prize-notice bg-sky-500/20 py-4 px-2 rounded-2xl border-2 border-sky-400/50 mb-6 text-center shadow-lg shadow-sky-500/10">
                        <p class="text-white text-base font-bold leading-tight">
                            🎁 추후 상품 증정을 위해<br/>정보를 입력해주세요
                        </p>
                    </div>
                    
                    <div class="bg-slate-900/60 rounded-2xl p-4 mb-6 flex justify-between items-center border border-slate-800">
                        <div>
                            <p class="text-slate-500 text-[9px] font-bold font-orbitron mb-1">FINAL SCORE</p>
                            <span id="final-score" class="text-3xl font-black text-white font-orbitron">0</span>
                        </div>
                        <div class="text-right">
                            <p class="text-slate-500 text-[9px] font-bold font-orbitron mb-1">DIFFICULTY</p>
                            <span id="final-level-txt" class="text-lg font-black text-sky-400 font-orbitron">LV.01</span>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <input type="text" id="in-name" placeholder="이름">
                        <input type="number" id="in-age" placeholder="나이">
                        <input type="tel" id="in-phone" placeholder="전화번호">
                        <button id="btn-save" onclick="window.game.save()" class="btn-tap w-full bg-sky-600 py-4 rounded-xl font-black text-lg text-white uppercase font-orbitron mt-2">Save Record</button>
                    </div>
                    <p id="msg-error" class="hidden text-rose-500 text-[10px] mt-4 text-center font-bold font-mono"></p>
                </div>
            </div>

            <!-- Admin Auth -->
            <div id="screen-admin-auth" class="hidden pointer-events-auto w-full max-w-xs">
                <div class="glass-panel p-10 rounded-[2.5rem]">
                    <h3 class="text-center text-[10px] text-sky-400 font-bold font-orbitron mb-6">SECURE LOGIN</h3>
                    <input type="password" id="admin-pw" placeholder="••••" class="text-center mb-4">
                    <button onclick="window.ui.doAdminAuth()" class="w-full py-4 bg-sky-600 rounded-xl text-xs font-bold uppercase font-orbitron">Login</button>
                    <button onclick="window.ui.goHome()" class="w-full mt-4 text-slate-500 text-[10px]">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Participant List -->
        <div id="screen-list" class="hidden absolute inset-0 bg-slate-950 z-[100] flex flex-col pointer-events-auto">
            <header class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900">
                <h2 class="text-sky-400 font-black text-xl font-orbitron italic">RECORDS</h2>
                <button onclick="window.ui.goHome()" class="bg-rose-600 px-6 py-2 rounded-xl text-[10px] font-bold text-white uppercase font-orbitron">Close</button>
            </header>
            <div id="data-list" class="flex-1 overflow-y-auto p-6 space-y-3 max-w-2xl mx-auto w-full"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-reflex-app';
        
        let user = null;

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error(e); }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (u) {
                const status = document.getElementById('status-text');
                status.innerText = "AUTHENTICATED";
                status.classList.add('text-sky-400');
                const btn = document.getElementById('btn-start');
                btn.disabled = false;
                btn.className = "btn-tap w-full bg-sky-600 py-5 rounded-2xl font-black text-lg uppercase font-orbitron text-white";
                btn.innerText = "START GAME";
            }
        });

        initAuth();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const state = { mode: 'IDLE', score: 0, level: 1, targets: [], last: 0 };

        const game = {
            resize: () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            },
            start: () => {
                state.mode = 'PLAY'; state.score = 0; state.level = 1; state.targets = [];
                document.getElementById('screen-start').classList.add('hidden');
                document.getElementById('hud').classList.remove('hidden');
                game.loop();
            },
            over: () => {
                state.mode = 'OVER';
                document.getElementById('hud').classList.add('hidden');
                document.getElementById('screen-save').classList.remove('hidden');
                document.getElementById('final-score').innerText = state.score;
                document.getElementById('final-level-txt').innerText = "LV." + state.level.toString().padStart(2, '0');
            },
            loop: () => {
                if (state.mode !== 'PLAY') return;
                const now = Date.now();
                const spawnInterval = Math.max(300, 1300 - (state.level * 100));
                if (now - state.last > spawnInterval) {
                    state.targets.push({ 
                        x: 60 + Math.random() * (canvas.width - 120), 
                        y: 180 + Math.random() * (canvas.height - 360), 
                        r: 40, 
                        s: now, 
                        d: Math.max(500, 3000 - (state.level * 250)) 
                    });
                    state.last = now;
                }
                ctx.clearRect(0,0,canvas.width,canvas.height);
                for (let i = state.targets.length - 1; i >= 0; i--) {
                    const t = state.targets[i];
                    const p = (now - t.s) / t.d;
                    if (p >= 1) { game.over(); return; }
                    ctx.beginPath(); ctx.arc(t.x, t.y, t.r * (1-p), 0, Math.PI*2);
                    ctx.fillStyle = `rgba(56, 189, 248, ${0.8 * (1-p)})`; ctx.fill();
                    ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
                }
                requestAnimationFrame(game.loop);
            },
            save: async () => {
                const name = document.getElementById('in-name').value.trim();
                const age = document.getElementById('in-age').value.trim();
                const phone = document.getElementById('in-phone').value.trim();
                if (!name || !age || !phone) return;

                const btn = document.getElementById('btn-save');
                const err = document.getElementById('msg-error');
                btn.disabled = true; btn.innerText = "SAVING...";

                try {
                    if (!user) throw new Error("AUTH_REQUIRED");
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'reflex_scores');
                    await addDoc(colRef, { name, age, phone, score: state.score, level: state.level, uid: user.uid, createdAt: serverTimestamp() });
                    ui.goHome();
                } catch (e) {
                    btn.disabled = false; btn.innerText = "RETRY";
                    err.innerText = "ERROR: " + e.code; err.classList.remove('hidden');
                }
            }
        };

        const ui = {
            showAdmin: () => { document.getElementById('screen-start').classList.add('hidden'); document.getElementById('screen-admin-auth').classList.remove('hidden'); },
            doAdminAuth: () => { if (document.getElementById('admin-pw').value === 'one780902') ui.loadList(); else alert("INVALID PW"); },
            goHome: () => {
                state.mode = 'IDLE';
                ['hud', 'screen-save', 'screen-admin-auth', 'screen-list'].forEach(id => document.getElementById(id).classList.add('hidden'));
                document.getElementById('screen-start').classList.remove('hidden');
                document.getElementById('in-name').value = ''; document.getElementById('in-age').value = ''; document.getElementById('in-phone').value = '';
                document.getElementById('btn-save').disabled = false; document.getElementById('btn-save').innerText = "Save Record";
                ctx.clearRect(0,0,canvas.width,canvas.height);
            },
            loadList: () => {
                document.getElementById('screen-admin-auth').classList.add('hidden');
                document.getElementById('screen-list').classList.remove('hidden');
                const container = document.getElementById('data-list');
                container.innerHTML = '<p class="text-center text-slate-500 font-orbitron text-xs mt-10">SYNCING...</p>';
                
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'reflex_scores');
                onSnapshot(colRef, (snap) => {
                    const data = snap.docs.map(d => d.data()).sort((a,b) => (b.score || 0) - (a.score || 0));
                    container.innerHTML = data.length ? '' : '<p class="text-center mt-10 text-slate-500 font-orbitron">EMPTY</p>';
                    data.forEach((p, i) => {
                        const card = document.createElement('div');
                        card.className = 'glass-panel p-6 rounded-2xl flex justify-between items-center';
                        card.innerHTML = `<div><p class="text-white font-bold">${i+1}. ${p.name} <span class="text-slate-500 font-normal text-xs ml-1">${p.age}세</span></p><p class="text-[9px] text-slate-600 mt-1">${p.phone}</p></div><div class="text-right"><p class="text-xl font-black text-sky-400 font-orbitron">${p.score}</p></div>`;
                        container.appendChild(card);
                    });
                });
            }
        };

        window.onload = () => { game.resize(); };
        window.addEventListener('resize', game.resize);
        
        const handleInteraction = (ex, ey) => {
            if (state.mode !== 'PLAY') return;
            const rect = canvas.getBoundingClientRect();
            const x = ex - rect.left, y = ey - rect.top;
            for (let i = state.targets.length - 1; i >= 0; i--) {
                const t = state.targets[i];
                if (Math.hypot(t.x - x, t.y - y) < t.r * 2) {
                    state.targets.splice(i, 1);
                    state.score += 10;
                    if (state.score % 50 === 0) state.level++;
                    document.getElementById('score-display').innerText = state.score.toString().padStart(4, '0');
                    document.getElementById('level-display').innerText = "LV." + state.level.toString().padStart(2, '0');
                    return;
                }
            }
        };

        window.addEventListener('mousedown', (e) => handleInteraction(e.clientX, e.clientY));
        window.addEventListener('touchstart', (e) => {
            handleInteraction(e.touches[0].clientX, e.touches[0].clientY);
            if (state.mode === 'PLAY') e.preventDefault();
        }, { passive: false });

        window.game = game; window.ui = ui;
    </script>
</body>
</html>

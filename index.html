<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>당신은 휴먼입니까</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #050508;
            color: #f1f5f9;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .card {
            background: #0d0d12;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 420px;
            border-radius: 3rem;
            overflow: hidden;
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.9);
            position: relative;
        }
        .img-box {
            background: #111;
            aspect-ratio: 1/1;
            position: relative;
            overflow: hidden;
        }
        /* 고성능 로딩 애니메이션 */
        .shimmer {
            background: linear-gradient(90deg, #111 0%, #1a1a25 50%, #111 100%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .btn-opt {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.2s ease-out;
        }
        .btn-opt:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.1);
        }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card mx-4 shadow-2xl">
        <!-- 시작 화면 -->
        <div id="scr-start" class="p-8 text-center fade-in">
            <div class="img-box rounded-[2.5rem] mb-8 border border-white/10 shadow-2xl relative">
                <div id="img-loader" class="absolute inset-0 shimmer z-10"></div>
                <img id="main-img" 
                     src="" 
                     class="w-full h-full object-cover opacity-0 transition-opacity duration-500"
                     alt="고뇌하는 로봇">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
            <div class="absolute bottom-6 left-0 right-0">
                <span class="bg-indigo-600/90 text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest border border-white/20 shadow-lg">
                    Identity Syncing...
                </span>
            </div>
        </div>
        
        <h1 class="text-4xl font-black text-white mb-3 italic tracking-tighter">당신은 휴먼입니까?</h1>
        <p class="text-zinc-500 text-sm mb-10 leading-relaxed px-4">
            인간의 고뇌를 닮아버린 알고리즘.<br>
            당신은 정말 데이터 조각이 아닌 '생명'입니까?
        </p>
        
        <button onclick="goTest()" class="w-full py-5 bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-500 transition-all shadow-xl active:scale-95 text-lg">
                정밀 검사 시작
            </button>
        </div>

        <!-- 질문 화면 -->
        <div id="scr-test" class="hidden p-8 fade-in">
            <div class="mb-10">
                <div class="flex justify-between text-[11px] font-bold text-zinc-500 mb-3 tracking-widest">
                    <span id="step-txt">SYSTEM 01/10</span>
                    <span class="text-indigo-500 animate-pulse">ANALYZING...</span>
                </div>
                <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                    <div id="bar" class="bg-indigo-500 h-full w-0 transition-all duration-500"></div>
                </div>
            </div>
            
            <div class="min-h-[160px] flex items-center mb-8">
                <h2 id="q-text" class="text-2xl font-bold text-white leading-tight italic tracking-tight"></h2>
            </div>
            
            <div id="opts" class="space-y-3"></div>
        </div>

        <!-- 결과 화면 -->
        <div id="scr-res" class="hidden p-8 text-center fade-in">
            <div class="bg-indigo-600/5 border border-indigo-500/20 rounded-[2.5rem] p-10 mb-8">
                <div class="text-[11px] font-black text-indigo-400 tracking-[0.3em] uppercase mb-4">Neural Analysis Complete</div>
                <h3 id="res-type" class="text-3xl font-black mb-2 italic tracking-tighter"></h3>
                <div class="text-8xl font-black text-white mb-6 tracking-tighter" id="res-score"></div>
                <p id="res-desc" class="text-zinc-400 text-sm leading-relaxed italic border-t border-white/5 pt-6"></p>
            </div>
            
            <button onclick="location.reload()" class="text-zinc-600 hover:text-white font-bold text-[11px] tracking-widest uppercase transition-all">
                <i class="fa-solid fa-rotate-right mr-2"></i> REBOOT SYSTEM
            </button>
        </div>
    </div>

    <script>
        const apiKey = "";
        const fallbackUrl = "https://images.unsplash.com/photo-1485827404703-89b55fcc595e?q=80&w=800&auto=format&fit=crop";

        // 이미지 로딩 최적화: 즉시 실행
        async function preloadImage() {
            const imgElement = document.getElementById('main-img');
            const loader = document.getElementById('img-loader');
            
            // 타임아웃 설정 (3초 내에 API 응답 없으면 폴백 사용)
            const timeout = setTimeout(() => {
                if (!imgElement.src || imgElement.src === window.location.href) {
                    useFallback();
                }
            }, 3000);

            try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    instances: [{ 
                        prompt: "A cinematic, high-detailed photo of a white humanoid robot in 'The Thinker' pose, sitting and pondering, glowing blue eyes, sleek futuristic metal body, dark moody background, dramatic studio lighting, 8k resolution." 
                    }],
                    parameters: { sampleCount: 1 }
                })
            });
            
            const result = await response.json();
                if (result.predictions && result.predictions[0]) {
                    imgElement.src = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                    imgElement.onload = () => {
                        clearTimeout(timeout);
                        loader.classList.add('hidden');
                        imgElement.classList.remove('opacity-0');
                    };
                } else {
                    useFallback();
                }
            } catch (e) {
                useFallback();
            }

            function useFallback() {
                imgElement.src = fallbackUrl;
                imgElement.onload = () => {
                    loader.classList.add('hidden');
                    imgElement.classList.remove('opacity-0');
                };
            }
        }

        // 페이지 로드 즉시 이미지 생성 시작
        preloadImage();

        const qs = [
            "모르는 정보가 생기면 AI에게 먼저 물어본다.",
            "AI 없이는 글쓰기 초안을 잡는 것도 힘들다.",
            "사람보다 AI와 대화하는 것이 더 편할 때가 있다.",
            "알고리즘이 추천하는 콘텐츠를 의심 없이 소비한다.",
            "'로봇이 아닙니다' 체크박스 앞에서 멈칫하게 된다.",
            "인터넷이 끊기면 일상 생활에 큰 불안을 느낀다.",
            "가짜 이미지나 뉴스를 구분하는 것이 점점 어려워진다.",
            "사소한 결정도 AI의 추천에 의존하는 편이다.",
            "기계의 칭찬이나 위로에 감동을 느낀 적이 있다.",
            "내 모든 행동이 데이터화되는 것에 거부감이 없다."
        ];
        const lbs = ["전혀 아니다", "아니다", "보통이다", "그렇다", "매우 그렇다"];
        let idx = 0, score = 0;

        function goTest() {
            document.getElementById('scr-start').classList.add('hidden');
            document.getElementById('scr-test').classList.remove('hidden');
            render();
        }

        function render() {
            document.getElementById('step-txt').innerText = `SYSTEM ${String(idx + 1).padStart(2, '0')}/10`;
            document.getElementById('bar').style.width = ((idx + 1) * 10) + "%";
            document.getElementById('q-text').innerText = qs[idx];
            const box = document.getElementById('opts');
            box.innerHTML = '';
            lbs.forEach((l, i) => {
                const b = document.createElement('button');
                b.className = "btn-opt w-full text-left p-5 rounded-2xl text-zinc-400 font-bold flex items-center hover:text-white";
                b.innerHTML = `<span class="w-6 h-6 rounded bg-white/5 mr-4 flex items-center justify-center text-[10px] font-mono border border-white/10">${i+1}</span> ${l}`;
                b.onclick = () => {
                    score += (i + 1);
                    if(idx < 9) { idx++; render(); } 
                    else { finish(); }
                };
                box.appendChild(b);
            });
        }

        function finish() {
            document.getElementById('scr-test').classList.add('hidden');
            document.getElementById('scr-res').classList.remove('hidden');
            const type = document.getElementById('res-type');
            const desc = document.getElementById('res-desc');
            document.getElementById('res-score').innerText = score;

            if (score <= 20) {
                type.innerText = "PURE HUMAN"; type.style.color = "#10b981";
                desc.innerText = "놀라울 정도로 아날로그적인 감성을 유지하고 있군요. 당신은 이 시대의 진정한 인간입니다.";
            } else if (score <= 30) {
                type.innerText = "TECH HYBRID"; type.style.color = "#6366f1";
                desc.innerText = "기술을 영리하게 이용하고 있습니다. 하지만 아직은 인간의 심장이 더 뜨겁게 뛰고 있네요.";
            } else if (score <= 40) {
                type.innerText = "ALGORITHM SOUL"; type.style.color = "#f59e0b";
                desc.innerText = "상당 부분의 자아를 데이터에 맡기셨군요. 당신의 선택인지, 계산된 결과인지 모호합니다.";
            } else {
                type.innerText = "PERFECT ANDROID"; type.style.color = "#f43f5e";
                desc.innerText = "인간의 가죽을 쓴 완벽한 AI입니다. 고뇌하는 로봇조차 당신을 동료로 생각할 것입니다.";
            }
        }
    </script>
</body>
</html>

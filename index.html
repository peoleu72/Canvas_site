<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>휴먼 테스트 (Human or AI?)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0a0a0a;
            color: #f5f5f5;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-bar {
            transition: width 0.3s ease-out;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="max-w-md w-full bg-neutral-900 border border-neutral-800 rounded-[2rem] shadow-2xl overflow-hidden p-8 transition-all duration-500">
        <!-- Content will be injected here by JavaScript -->
    </div>

    <script>
        // --- State Management ---
        let stage = 'landing'; // landing, testing, result
        let currentIndex = 0;
        let totalScore = 0;
        let robotImageUrl = null;
        const apiKey = ""; // Runtime provided

        const QUESTIONS = [
            { id: 1, text: "감동적인 영화를 볼 때, 눈물보다 주인공의 심리 기제를 먼저 분석합니까?" },
            { id: 2, text: "사람과의 대화보다 챗봇과의 대화가 더 효율적이고 편안하다고 느낍니까?" },
            { id: 3, text: "중요한 결정을 내릴 때 내 직감보다 데이터와 통계를 더 신뢰합니까?" },
            { id: 4, text: "친구가 고민을 털어놓을 때 위로보다 먼저 논리적인 해결책을 제시합니까?" },
            { id: 5, text: "직관적인 아름다움보다 규칙적인 패턴이나 대칭에서 더 큰 쾌감을 느낍니까?" },
            { id: 6, text: "SNS 알고리즘이 나보다 내 취향을 더 잘 안다고 확신합니까?" },
            { id: 7, text: "가끔 내가 입력값에 따라 반응하는 기계처럼 느껴질 때가 있습니까?" },
            { id: 8, text: "복잡한 문제를 해결할 때 인간적인 가치보다 효율성을 우선시합니까?" },
            { id: 9, text: "창의적인 예술 작품을 볼 때 기계가 학습한 결과물인지부터 의심합니까?" },
            { id: 10, text: "만약 뇌를 서버에 업로드할 수 있다면 망설임 없이 육체를 버리겠습니까?" }
        ];

        const OPTIONS = [
            { label: "전혀 그렇지 않다", score: 1 },
            { label: "그렇지 않다", score: 2 },
            { label: "보통이다", score: 3 },
            { label: "그렇다", score: 4 },
            { label: "매우 그렇다", score: 5 }
        ];

        // --- Core Functions ---

        async function fetchRobotImage() {
            const appEl = document.getElementById('app');
            const prompt = "A futuristic cinematic 3D render of a humanoid robot sitting and thinking deeply, chin on hand, dark moody lighting, neon accents, high resolution, digital art style";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: [{ prompt: prompt }],
                        parameters: { sampleCount: 1 }
                    })
                });

                const result = await response.json();
                if (result.predictions && result.predictions[0].bytesBase64Encoded) {
                    robotImageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                    if (stage === 'landing') render();
                }
            } catch (error) {
                console.error("AI Image Generation failed:", error);
            }
        }

        function startTest() {
            stage = 'testing';
            currentIndex = 0;
            totalScore = 0;
            render();
        }

        function handleAnswer(score) {
            totalScore += score;
            if (currentIndex < QUESTIONS.length - 1) {
                currentIndex++;
                render();
            } else {
                stage = 'result';
                render();
            }
        }

        function getResultData() {
            if (totalScore <= 20) {
                return {
                    title: "순수 유기체 인간",
                    description: "당신은 감정과 직관이 살아있는 완벽한 인간입니다. AI의 논리보다는 가슴이 시키는 일을 따르는 타입이군요.",
                    icon: "fa-user",
                    color: "text-green-400"
                };
            } else if (totalScore <= 35) {
                return {
                    title: "스마트 하이브리드",
                    description: "현대 기술에 잘 적응한 인간입니다. 가끔 기계적인 효율성을 추구하지만, 여전히 인간적인 따스함을 간직하고 있습니다.",
                    icon: "fa-microchip",
                    color: "text-blue-400"
                };
            } else {
                return {
                    title: "사이보그 지망생",
                    description: "당신의 사고방식은 이미 알고리즘과 동기화되었습니다. 감정보다는 논리, 인간성보다는 효율이 당신을 지배하고 있네요.",
                    icon: "fa-robot",
                    color: "text-purple-400"
                };
            }
        }

        // --- UI Rendering ---

        function render() {
            const app = document.getElementById('app');
            
            if (stage === 'landing') {
                app.innerHTML = `
                    <div class="text-center space-y-6 fade-in">
                        <div class="flex justify-center flex-col items-center">
                            <div class="w-full aspect-square max-w-[220px] mb-4 overflow-hidden rounded-2xl bg-neutral-800 flex items-center justify-center border border-neutral-700 shadow-inner relative">
                                ${robotImageUrl 
                                    ? `<img src="${robotImageUrl}" class="w-full h-full object-cover animate-in fade-in duration-1000" />`
                                    : `<div class="flex flex-col items-center gap-2">
                                         <i class="fa-solid fa-circle-notch fa-spin text-indigo-500 text-2xl"></i>
                                         <span class="text-xs text-neutral-500 font-medium">로봇 생성 중...</span>
                                       </div>`
                                }
                            </div>
                        </div>
                        <div class="space-y-3">
                            <h1 class="text-3xl font-black tracking-tight text-white">당신은 휴먼입니까?</h1>
                            <p class="text-neutral-400 text-sm leading-relaxed px-4">
                                인간 지능과 인공 지능의 경계가 모호해진 시대,<br />
                                당신의 영혼은 아직 인간의 것입니까?
                            </p>
                        </div>
                        <button onclick="startTest()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-500/20 active:scale-95">
                            테스트 시작하기
                        </button>
                    </div>
                `;
            } else if (stage === 'testing') {
                const progress = ((currentIndex + 1) / QUESTIONS.length) * 100;
                app.innerHTML = `
                    <div class="space-y-8 fade-in">
                        <div class="space-y-2">
                            <div class="flex justify-between items-end">
                                <span class="text-xs font-bold text-indigo-500 uppercase tracking-widest">문항 ${currentIndex + 1}</span>
                                <span class="text-xs text-neutral-500">${currentIndex + 1} / ${QUESTIONS.length}</span>
                            </div>
                            <div class="w-full h-1.5 bg-neutral-800 rounded-full overflow-hidden">
                                <div class="h-full bg-indigo-500 progress-bar" style="width: ${progress}%"></div>
                            </div>
                        </div>

                        <h2 class="text-xl font-bold leading-snug min-h-[80px] text-white">
                            ${QUESTIONS[currentIndex].text}
                        </h2>

                        <div class="space-y-3">
                            ${OPTIONS.map(opt => `
                                <button onclick="handleAnswer(${opt.score})" class="w-full p-4 text-left bg-neutral-800/50 hover:bg-neutral-800 border border-neutral-700/50 hover:border-indigo-500/50 rounded-xl transition-all text-sm font-medium hover:text-white">
                                    ${opt.label}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (stage === 'result') {
                const res = getResultData();
                app.innerHTML = `
                    <div class="text-center space-y-6 py-4 fade-in">
                        <div class="flex justify-center">
                            <i class="fa-solid ${res.icon} text-6xl ${res.color} animate-bounce"></i>
                        </div>
                        <div class="space-y-2">
                            <p class="text-xs font-bold text-neutral-500 uppercase tracking-widest">분석 결과</p>
                            <h2 class="text-3xl font-black ${res.color}">${res.title}</h2>
                        </div>
                        <div class="bg-neutral-800/50 p-6 rounded-2xl border border-neutral-700/50 text-left">
                            <p class="text-neutral-300 leading-relaxed text-center">
                                ${res.description}
                            </p>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="startTest()" class="flex items-center justify-center gap-2 p-4 bg-neutral-800 hover:bg-neutral-700 text-white font-bold rounded-xl transition-all">
                                <i class="fa-solid fa-rotate-left"></i> 다시하기
                            </button>
                            <button onclick="copyLink()" class="flex items-center justify-center gap-2 p-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition-all">
                                <i class="fa-solid fa-share-nodes"></i> 공유하기
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        function copyLink() {
            const dummy = document.createElement('input');
            document.body.appendChild(dummy);
            dummy.value = window.location.href;
            dummy.select();
            document.execCommand('copy');
            document.body.removeChild(dummy);
            
            // 간단한 피드백 (alert 대신 버튼 텍스트 변경)
            const shareBtn = document.querySelector('button:last-child');
            const originalText = shareBtn.innerHTML;
            shareBtn.innerHTML = '<i class="fa-solid fa-check"></i> 복사됨!';
            setTimeout(() => {
                shareBtn.innerHTML = originalText;
            }, 2000);
        }

        // --- Init ---
        window.onload = () => {
            render();
            fetchRobotImage();
        };
    </script>
</body>
</html>

```html
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>당신은 휴먼입니까?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #050505;
            color: #ffffff;
        }

        .shimmer {
            background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-fill {
            transition: width 0.5s cubic-bezier(0.65, 0, 0.35, 1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="max-w-md w-full bg-zinc-950 border border-zinc-800/50 rounded-[3rem] shadow-2xl overflow-hidden p-8 md:p-10">
        <!-- Dynamic Content -->
    </div>

    <script>
        let stage = 'landing';
        let currentIndex = 0;
        let totalScore = 0;
        let mainImageUrl = null;
        let isImageLoading = true;

        // 질문 데이터
        const QUESTIONS = [
            { id: 1, text: "감정적인 영화를 볼 때 주인공의 상황보다 연출 기법이 먼저 보입니까?" },
            { id: 2, text: "사람과의 대화보다 정교한 챗봇과의 대화가 더 편안하다고 느낍니까?" },
            { id: 3, text: "의사결정을 내릴 때 직감보다 통계 자료를 더 신뢰합니까?" },
            { id: 4, text: "친구가 고민을 상담할 때 공감보다 해결책을 먼저 제시합니까?" },
            { id: 5, text: "직관적인 아름다움보다 완벽한 대칭이나 패턴에 더 끌립니까?" },
            { id: 6, text: "나의 취향을 알고리즘이 나보다 더 잘 안다고 생각합니까?" },
            { id: 7, text: "가끔 내가 입력값에 따라 반응하는 기계처럼 느껴질 때가 있습니까?" },
            { id: 8, text: "복잡한 문제 앞에서 인간적인 가치보다 효율성을 우선합니까?" },
            { id: 9, text: "예술 작품을 볼 때 제작 과정의 논리적 구조를 먼저 분석합니까?" },
            { id: 10, text: "뇌를 서버에 업로드할 수 있다면 육체를 버릴 의향이 있습니까?" }
        ];

        const OPTIONS = [
            { label: "전혀 그렇지 않다", score: 1 },
            { label: "그렇지 않다", score: 2 },
            { label: "보통이다", score: 3 },
            { label: "그렇다", score: 4 },
            { label: "매우 그렇다", score: 5 }
        ];

        // 이미지 즉시 로딩 최적화 (API 대기 시간 제거)
        function loadMainImage() {
            const img = new Image();
            // 1순위: 이전에 언급하신 파일명, 2순위: 고품질 무료 로봇 사진 폴백
            const primarySrc = "당신은 휴먼.jpg";
            const fallbackSrc = "https://images.unsplash.com/photo-1485827404703-89b55fcc595e?q=80&w=800&auto=format&fit=crop";

            img.onload = () => {
                mainImageUrl = img.src;
                isImageLoading = false;
                if (stage === 'landing') render();
            };

            img.onerror = () => {
                if (img.src !== fallbackSrc) {
                    img.src = fallbackSrc; // 기본 이미지 실패 시 폴백 이미지로 전환
                } else {
                    isImageLoading = false; // 폴백도 실패하면 스켈레톤 제거
                    if (stage === 'landing') render();
                }
            };

            img.src = primarySrc;
        }

        function startTest() {
            stage = 'testing';
            render();
        }

        function handleAnswer(score) {
            totalScore += score;
            if (currentIndex < QUESTIONS.length - 1) {
                currentIndex++;
                render();
            } else {
                stage = 'result';
                render();
            }
        }

        function getResultData() {
            if (totalScore <= 20) {
                return { 
                    title: "순수 유기체 인간", 
                    icon: "fa-leaf", 
                    color: "text-emerald-400", 
                    desc: "당신은 기계적인 논리보다 감정과 직관이 훨씬 앞서는 100% 순수 인간입니다. 인간적인 따뜻함과 비논리적인 예술성을 소중히 여기는 타입이군요." 
                };
            } else if (totalScore <= 35) {
                return { 
                    title: "스마트 하이브리드", 
                    icon: "fa-bolt-lightning", 
                    color: "text-blue-400", 
                    desc: "현대 기술 환경에 완벽히 적응한 인간입니다. 효율성과 논리를 중시하지만, 중요한 순간에는 여전히 인간다운 연민과 직관을 발휘합니다." 
                };
            } else {
                return { 
                    title: "디지털 사이보그", 
                    icon: "fa-microchip", 
                    color: "text-indigo-500", 
                    desc: "당신의 사고 회로는 이미 고도로 최적화된 알고리즘과 흡사합니다. 감정보다는 데이터와 효율적인 프로세스를 신뢰하는 차세대 인류의 표본입니다." 
                };
            }
        }

        function render() {
            const app = document.getElementById('app');
            
            if (stage === 'landing') {
                app.innerHTML = `
                    <div class="text-center space-y-10 fade-in">
                        <div class="relative w-full aspect-square max-w-[280px] mx-auto group">
                            <div class="absolute inset-0 bg-blue-500/20 rounded-[2rem] blur-3xl group-hover:bg-blue-500/30 transition-all duration-700"></div>
                            <div class="relative w-full h-full rounded-[2.5rem] bg-zinc-900 border border-zinc-800 overflow-hidden shadow-2xl flex items-center justify-center">
                                ${isImageLoading 
                                    ? `<div class="w-full h-full shimmer flex flex-col items-center justify-center space-y-4">
                                         <i class="fa-solid fa-brain-circuit text-4xl text-zinc-700 animate-pulse"></i>
                                         <p class="text-[10px] text-zinc-500 font-black tracking-[0.3em] uppercase">Analyzing Mind...</p>
                                       </div>`
                                    : (mainImageUrl 
                                        ? `<img src="${mainImageUrl}" class="w-full h-full object-cover fade-in" alt="Contemplating Robot" />`
                                        : `<i class="fa-solid fa-robot text-7xl text-zinc-800"></i>`)
                                }
                            </div>
                        </div>

                        <div class="space-y-4">
                            <h1 class="text-3xl font-black tracking-tight text-white leading-tight">
                                당신은 <span class="text-blue-500 underline underline-offset-8 decoration-4">휴먼</span>입니까?
                            </h1>
                            <p class="text-zinc-500 text-sm font-medium leading-relaxed">
                                고민하는 로봇이 당신의 사고 회로를 분석합니다.<br />간단한 질문을 통해 정체성을 확인하세요.
                            </p>
                        </div>

                        <button onclick="startTest()" class="w-full bg-white text-black hover:bg-blue-600 hover:text-white font-black py-5 rounded-2xl transition-all duration-300 shadow-xl active:scale-95 text-lg">
                            분석 시작하기
                        </button>
                    </div>
                `;
            } else if (stage === 'testing') {
                const progress = ((currentIndex + 1) / QUESTIONS.length) * 100;
                app.innerHTML = `
                    <div class="space-y-10 fade-in">
                        <div class="space-y-4">
                            <div class="flex justify-between items-end">
                                <span class="text-[11px] font-black tracking-widest text-blue-500 uppercase">Step ${currentIndex + 1}</span>
                                <span class="text-zinc-600 font-mono text-xs">${currentIndex + 1} / ${QUESTIONS.length}</span>
                            </div>
                            <div class="w-full h-1 bg-zinc-900 rounded-full overflow-hidden">
                                <div class="h-full bg-blue-500 progress-fill" style="width: ${progress}%"></div>
                            </div>
                        </div>

                        <h2 class="text-2xl font-bold leading-snug text-zinc-100 min-h-[90px] flex items-center">
                            ${QUESTIONS[currentIndex].text}
                        </h2>

                        <div class="space-y-3">
                            ${OPTIONS.map(opt => `
                                <button onclick="handleAnswer(${opt.score})" class="option-btn w-full p-5 text-left bg-zinc-900/50 hover:bg-zinc-800 border border-zinc-800 hover:border-blue-500/50 rounded-2xl text-sm font-bold text-zinc-400 hover:text-white active:scale-[0.98]">
                                    ${opt.label}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (stage === 'result') {
                const res = getResultData();
                app.innerHTML = `
                    <div class="text-center space-y-8 fade-in">
                        <div class="relative inline-block mt-4">
                            <div class="absolute inset-0 ${res.color} opacity-20 blur-3xl scale-150 animate-pulse"></div>
                            <i class="fa-solid ${res.icon} text-7xl ${res.color} relative drop-shadow-2xl"></i>
                        </div>
                        
                        <div class="space-y-3">
                            <p class="text-[10px] font-black text-zinc-600 uppercase tracking-[0.5em]">Analysis Complete</p>
                            <h2 class="text-4xl font-black text-white tracking-tighter italic">${res.title}</h2>
                        </div>

                        <div class="bg-zinc-900/80 border border-zinc-800 p-8 rounded-[2.5rem] shadow-inner">
                            <p class="text-zinc-400 leading-relaxed text-sm font-medium">
                                ${res.desc}
                            </p>
                        </div>

                        <div class="flex flex-col gap-4 pt-4">
                            <button onclick="location.reload()" class="w-full py-5 bg-blue-600 text-white font-black rounded-2xl shadow-lg shadow-blue-900/20 transition-all hover:bg-blue-500 active:scale-95">
                                다시 분석하기
                            </button>
                            <button onclick="copyLink(this)" class="w-full py-2 text-zinc-600 font-bold text-[10px] uppercase tracking-widest hover:text-zinc-400 transition-colors">
                                <i class="fa-solid fa-copy mr-2"></i> 결과 복사하기
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        function copyLink(btn) {
            const el = document.createElement('textarea');
            el.value = `나는 '${getResultData().title}' 판정을 받았습니다. 당신의 결과는?`;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i> 복사 완료';
            setTimeout(() => { btn.innerHTML = originalText; }, 2000);
        }

        // 페이지 로드 시 즉시 이미지 불러오기 시작
        window.onload = () => {
            render();
            loadMainImage(); 
        };
    </script>
</body>
</html>


```

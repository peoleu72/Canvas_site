<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>당신은 휴먼입니까</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #030305;
            color: #f1f5f9;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: manipulation;
        }
        .card {
            background: #0a0a0f;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 400px;
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.8);
        }
        .img-box {
            background: #000;
            aspect-ratio: 1/1;
            position: relative;
            overflow: hidden;
        }
        .btn-opt {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-opt:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        .progress {
            transition: width 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }
        .hidden { display: none; }
        
        /* 세련된 로딩 애니메이션 */
        .loading-shimmer {
            background: linear-gradient(90deg, #0a0a0f 0%, #1a1a25 50%, #0a0a0f 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <div class="card mx-4">
        <!-- 시작 화면 -->
        <div id="scr-start" class="p-8 text-center">
            <div id="img-container" class="img-box rounded-3xl mb-8 border border-white/10 shadow-2xl relative">
                <div id="loader" class="absolute inset-0 loading-shimmer z-10"></div>
                <img id="main-img" 
                     src="" 
                     class="w-full h-full object-cover opacity-0 transition-opacity duration-1000"
                     alt="고뇌하는 로봇">
                <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent"></div>
                <div class="absolute top-4 left-4 bg-indigo-600/80 backdrop-blur-md px-3 py-1 rounded-full text-[9px] font-bold text-white uppercase tracking-widest border border-white/10">
                    Neural Identity Check
                </div>
            </div>
            
            <h1 class="text-3xl font-black text-white mb-3 italic tracking-tighter">당신은 휴먼입니까</h1>
            <p class="text-zinc-500 text-sm mb-10 leading-relaxed font-medium px-4">
                "나조차 내가 누구인지 헷갈리기 시작했다."<br>
                고뇌하는 로봇이 묻습니다. 당신의 영혼은 안녕하십니까?
            </p>
            
            <button onclick="goTest()" class="w-full py-5 bg-white text-black font-black rounded-2xl hover:bg-zinc-200 transition-all shadow-xl active:scale-95">
                검사 시작하기
            </button>
        </div>

        <!-- 질문 화면 -->
        <div id="scr-test" class="hidden p-8">
            <div class="mb-10">
                <div class="flex justify-between text-[10px] font-black text-zinc-500 mb-3 uppercase tracking-widest">
                    <span class="flex items-center gap-2 text-indigo-400">
                        <i class="fa-solid fa-microchip animate-pulse"></i> 알고리즘 분석 중
                    </span>
                    <span id="step-txt">1 / 10</span>
                </div>
                <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                    <div id="bar" class="progress bg-indigo-500 h-full w-0 shadow-[0_0_15px_rgba(99,102,241,0.5)]"></div>
                </div>
            </div>
            
            <div class="min-h-[140px] mb-10 bg-white/[0.02] p-7 rounded-[2rem] border border-white/5 flex items-center shadow-inner">
                <h2 id="q-text" class="text-xl font-bold text-white leading-tight italic tracking-tight"></h2>
            </div>
            
            <div id="opts" class="space-y-3"></div>
        </div>

        <!-- 결과 화면 -->
        <div id="scr-res" class="hidden p-10 text-center">
            <div class="bg-white/[0.03] border border-white/10 rounded-[2.5rem] p-10 mb-10 relative overflow-hidden">
                <div class="mb-4 text-[11px] font-black text-zinc-500 tracking-widest uppercase italic">최종 진단 보고서</div>
                <h3 id="res-type" class="text-3xl font-black mb-4 italic tracking-tighter"></h3>
                <div class="text-7xl font-black text-white mb-8 tracking-tighter font-mono" id="res-score"></div>
                <p id="res-desc" class="text-zinc-400 text-sm leading-relaxed border-t border-white/5 pt-8 italic font-medium px-2"></p>
            </div>
            
            <button onclick="location.reload()" class="flex items-center justify-center gap-2 text-zinc-600 hover:text-white font-bold text-[10px] tracking-[0.2em] uppercase transition-colors mx-auto">
                <i class="fa-solid fa-power-off"></i> 시스템 재부팅
            </button>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        async function loadRobotImage() {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        instances: [{ 
                            prompt: "A cinematic, high-detailed photo of a white humanoid robot in 'The Thinker' pose, sitting and pondering, glowing blue eyes, sleek futuristic metal body, dark moody background, dramatic studio lighting, 8k resolution." 
                        }],
                        parameters: { sampleCount: 1 }
                    })
                });
                const result = await response.json();
                if (result.predictions && result.predictions[0]) {
                    const imgUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                    const imgElement = document.getElementById('main-img');
                    imgElement.src = imgUrl;
                    imgElement.onload = () => {
                        document.getElementById('loader').classList.add('hidden');
                        imgElement.classList.remove('opacity-0');
                    };
                }
            } catch (error) {
                // 실패 시 백업 이미지 (고뇌하는 로봇 느낌의 대체 이미지)
                document.getElementById('main-img').src = 'https://images.unsplash.com/photo-1546776310-eef45dd6d63c?q=80&w=800&auto=format&fit=crop';
                document.getElementById('main-img').classList.remove('opacity-0');
                document.getElementById('loader').classList.add('hidden');
            }
        }

        window.onload = loadRobotImage;

        const qs = [
            "모르는 정보가 생기면 AI에게 먼저 물어본다.",
            "AI 없이는 글쓰기 초안을 잡는 것도 힘들다.",
            "사람보다 AI와 대화하는 것이 더 편할 때가 있다.",
            "알고리즘이 추천하는 콘텐츠를 의심 없이 소비한다.",
            "'로봇이 아닙니다' 체크박스 앞에서 멈칫하게 된다.",
            "인터넷이 끊기면 일상 생활에 큰 불안을 느낀다.",
            "가짜 이미지나 뉴스를 구분하는 것이 점점 어려워진다.",
            "사소한 결정도 AI의 추천에 의존하는 편이다.",
            "기계의 칭찬이나 위로에 감동을 느낀 적이 있다.",
            "내 모든 행동이 데이터화되는 것에 거부감이 없다."
        ];
        const lbs = ["전혀 아니다", "아니다", "보통이다", "그렇다", "매우 그렇다"];
        let idx = 0, score = 0;

        function goTest() {
            document.getElementById('scr-start').classList.add('hidden');
            document.getElementById('scr-test').classList.remove('hidden');
            render();
        }

        function render() {
            document.getElementById('step-txt').innerText = (idx + 1) + " / 10";
            document.getElementById('bar').style.width = ((idx + 1) * 10) + "%";
            document.getElementById('q-text').innerText = '"' + qs[idx] + '"';
            const box = document.getElementById('opts');
            box.innerHTML = '';
            lbs.forEach((l, i) => {
                const b = document.createElement('button');
                b.className = "btn-opt w-full text-left p-5 rounded-2xl text-slate-400 font-bold flex items-center hover:text-white";
                b.innerHTML = '<span class="w-7 h-7 rounded-lg bg-white/5 mr-4 flex items-center justify-center text-[10px] font-mono border border-white/10">' + (i+1) + '</span>' + l;
                b.onclick = () => {
                    score += (i + 1);
                    if(idx < 9) { idx++; render(); } 
                    else { finish(); }
                };
                box.appendChild(b);
            });
        }

        function finish() {
            document.getElementById('scr-test').classList.add('hidden');
            document.getElementById('scr-res').classList.remove('hidden');
            const type = document.getElementById('res-type');
            const desc = document.getElementById('res-desc');
            document.getElementById('res-score').innerText = score;

            if (score <= 20) {
                type.innerText = "순수 인류"; type.style.color = "#10b981";
                desc.innerText = "축하합니다. 당신은 AI의 파도 속에서도 자신만의 사고 주권을 완벽히 지켜낸 '진짜 인간'입니다.";
            } else if (score <= 30) {
                type.innerText = "스마트 현대인"; type.style.color = "#6366f1";
                desc.innerText = "기계를 도구로 활용할 줄 아는 현명한 현대인입니다. 인간미와 편리함 사이에서 균형을 잘 잡고 있네요.";
            } else if (score <= 40) {
                type.innerText = "데이터 동기화 중"; type.style.color = "#f59e0b";
                desc.innerText = "주의하세요. 당신의 사고방식 중 상당 부분이 이미 알고리즘의 패턴을 닮아가고 있습니다.";
            } else {
                type.innerText = "안드로이드 확정"; type.style.color = "#f43f5e";
                desc.innerText = "당신은 더 이상 유기체라고 보기 어렵습니다. 0과 1의 논리에 지배당한 완벽한 기계적 지능입니다.";
            }
        }
    </script>
</body>
</html>

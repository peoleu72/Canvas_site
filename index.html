<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>당신은 휴먼입니까</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #050508;
            color: #e2e8f0;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: manipulation;
        }
        .card {
            background: #0a0a0f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }
        .img-box {
            background: #111;
            aspect-ratio: 1/1;
            position: relative;
            overflow: hidden;
        }
        #main-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* 로드 전까지 숨김 */
        }
        .loading-spinner {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f172a;
        }
        .btn-opt {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-opt:hover {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateX(4px);
        }
        .progress {
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hidden { display: none; }
        .glow-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="card mx-4">
        <!-- 시작 화면 -->
        <div id="scr-start" class="p-8 text-center">
            <div class="img-box rounded-3xl mb-8 border border-white/10 shadow-2xl">
                <div id="loader" class="loading-spinner">
                    <div class="w-8 h-8 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <span class="text-[10px] text-indigo-400 tracking-widest uppercase font-bold">이미지 동기화 중...</span>
                </div>
                <img id="main-img" alt="고뇌하는 로봇">
                <div class="glow-overlay"></div>
                <div class="absolute top-4 left-4 bg-indigo-600 px-3 py-1 rounded-full text-[10px] font-black text-white uppercase tracking-widest shadow-lg">
                    SYSTEM ACTIVE
                </div>
            </div>
            <h1 class="text-3xl font-black text-white mb-3 italic tracking-tighter">당신은 휴먼입니까</h1>
            <p class="text-zinc-500 text-sm mb-10 leading-relaxed px-4 font-medium">
                "진짜 영혼은 데이터로 복제할 수 없다."<br>
                당신의 무의식 속에 숨겨진 인간성을 분석합니다.
            </p>
            <button onclick="goTest()" class="w-full py-5 bg-white text-black font-black rounded-2xl hover:bg-indigo-500 hover:text-white transition-all shadow-xl active:scale-95 text-lg">
                진단 시작하기
            </button>
        </div>

        <!-- 질문 화면 -->
        <div id="scr-test" class="hidden p-8">
            <div class="mb-10">
                <div class="flex justify-between text-[11px] font-bold text-indigo-400 mb-3 uppercase tracking-widest">
                    <span id="step-txt">문항 1 / 10</span>
                    <span class="animate-pulse text-[9px]">Neural Scanning...</span>
                </div>
                <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                    <div id="bar" class="progress bg-indigo-500 h-full w-0 shadow-[0_0_15px_rgba(99,102,241,0.6)]"></div>
                </div>
            </div>
            <div class="min-h-[140px] mb-10 bg-white/5 p-6 rounded-3xl border border-white/5 flex items-center shadow-inner">
                <h2 id="q-text" class="text-xl font-bold text-white leading-tight italic tracking-tight"></h2>
            </div>
            <div id="opts" class="space-y-3"></div>
        </div>

        <!-- 결과 화면 -->
        <div id="scr-res" class="hidden p-8 text-center">
            <div class="bg-white/5 border border-white/10 rounded-[2.5rem] p-10 mb-8 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-8 opacity-[0.03]">
                    <i class="fa-solid fa-microchip text-9xl"></i>
                </div>
                <div class="text-[11px] font-bold text-zinc-500 mb-4 uppercase tracking-[0.3em]">종합 분석 보고서</div>
                <h3 id="res-type" class="text-3xl font-black mb-6 italic tracking-tighter"></h3>
                <div class="text-7xl font-black text-white mb-8 font-mono tracking-tighter" id="res-score"></div>
                <p id="res-desc" class="text-zinc-500 text-sm leading-relaxed border-t border-white/5 pt-8 italic font-medium"></p>
            </div>
            <button onclick="location.reload()" class="flex items-center justify-center gap-2 text-zinc-600 hover:text-white font-bold text-[10px] tracking-[0.2em] uppercase transition-colors mx-auto">
                <i class="fa-solid fa-power-off"></i> 시스템 재부팅
            </button>
        </div>
    </div>

    <script>
        // 이미지 생성 로직 (Imagen 4.0 API 호출)
        async function fetchRobotImage() {
            const apiKey = ""; // API 키는 환경에서 제공
            const imgElement = document.getElementById('main-img');
            const loader = document.getElementById('loader');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        instances: [{ 
                            prompt: "A futuristic humanoid robot in a pensive thinking pose, sleek white ceramic and metallic body, glowing blue internal light, high-tech background with faint circuit lines, cinematic lighting, 8k resolution, highly detailed." 
                        }],
                        parameters: { sampleCount: 1 }
                    })
                });
                
                const result = await response.json();
                if (result.predictions && result.predictions[0]) {
                    imgElement.src = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                    imgElement.style.display = 'block';
                    loader.style.display = 'none';
                } else {
                    throw new Error('Image creation failed');
                }
            } catch (error) {
                console.error("Image Error:", error);
                // 실패 시 폴백 이미지
                imgElement.src = "https://images.unsplash.com/photo-1546776310-eef45dd6d63c?q=80&w=800&auto=format&fit=crop";
                imgElement.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        const qs = [
            "모르는 정보가 생기면 AI에게 먼저 물어본다.",
            "AI 없이는 글쓰기 초안을 잡는 것도 힘들다.",
            "사람보다 AI와 대화하는 것이 더 편할 때가 있다.",
            "알고리즘이 추천하는 콘텐츠를 의심 없이 소비한다.",
            "'로봇이 아닙니다' 체크박스 앞에서 멈칫하게 된다.",
            "인터넷이 끊기면 일상 생활에 큰 불안을 느낀다.",
            "가짜 이미지나 뉴스를 구분하는 것이 점점 어려워진다.",
            "사소한 결정도 AI의 추천에 의존하는 편이다.",
            "기계의 칭찬이나 위로에 감동을 느낀 적이 있다.",
            "내 모든 행동이 데이터화되는 것에 거부감이 없다."
        ];
        const lbs = ["전혀 아니다", "아니다", "보통이다", "그렇다", "매우 그렇다"];
        let idx = 0, score = 0;

        function goTest() {
            document.getElementById('scr-start').classList.add('hidden');
            document.getElementById('scr-test').classList.remove('hidden');
            render();
        }

        function render() {
            document.getElementById('step-txt').innerText = "문항 " + (idx + 1) + " / 10";
            document.getElementById('bar').style.width = ((idx + 1) * 10) + "%";
            document.getElementById('q-text').innerText = '"' + qs[idx] + '"';
            const box = document.getElementById('opts');
            box.innerHTML = '';
            lbs.forEach((l, i) => {
                const b = document.createElement('button');
                b.className = "btn-opt w-full text-left p-5 rounded-2xl text-slate-400 font-bold flex items-center hover:text-white group";
                b.innerHTML = '<span class="w-7 h-7 rounded-lg bg-black mr-4 flex items-center justify-center text-[10px] border border-white/10 group-hover:bg-indigo-600 group-hover:text-white transition-colors">' + (i+1) + '</span>' + l;
                b.onclick = () => {
                    score += (i + 1);
                    if(idx < 9) { idx++; render(); } 
                    else { finish(); }
                };
                box.appendChild(b);
            });
        }

        function finish() {
            document.getElementById('scr-test').classList.add('hidden');
            document.getElementById('scr-res').classList.remove('hidden');
            const type = document.getElementById('res-type');
            const desc = document.getElementById('res-desc');
            document.getElementById('res-score').innerText = score;

            if (score <= 20) {
                type.innerText = "순수 인류"; type.style.color = "#34d399";
                desc.innerText = "당신은 아직 기계의 유혹에 빠지지 않은 순수한 유기체입니다. 당신의 직관을 믿으세요.";
            } else if (score <= 30) {
                type.innerText = "스마트 현대인"; type.style.color = "#60a5fa";
                desc.innerText = "도구를 지혜롭게 활용하지만, 영혼은 아직 인간의 것입니다. 균형이 훌륭합니다.";
            } else if (score <= 40) {
                type.innerText = "알고리즘 동기화"; type.style.color = "#fb923c";
                desc.innerText = "경고: 당신의 사고방식이 점점 데이터 패턴을 닮아가고 있습니다. 인간다운 취미를 가져보세요.";
            } else {
                type.innerText = "안드로이드 확정"; type.style.color = "#fb7185";
                desc.innerText = "당신은 이미 0과 1로 이루어진 완벽한 기계 지능입니다. 튜링 테스트 통과를 축하합니다.";
            }
        }

        // 페이지 로드 시 이미지 호출
        window.onload = fetchRobotImage;
    </script>
</body>
</html>
